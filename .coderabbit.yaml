language: ko-KR

reviews:
  profile: assertive
  poem: true
  review_status: true
  high_level_summary: true
  auto_review:
    enabled: true
    auto_incremental_review: true
  path_filters:
    - "!installer_output/**"
    - "!dist/**"
    - "!build/**"
    - "!docs/images/**"
  path_instructions:
    - path: "src/puripuly_heart/config/settings.py"
      instructions: |
        Keep settings compatibility strict:
        - Keep to_dict and from_dict synchronized.
        - New settings must include defaults so existing settings.json still loads.
        - If a setting key is renamed, support the old key in from_dict for backward compatibility.
    - path: "src/puripuly_heart/ui/**/*.py"
      instructions: |
        Any new user-facing text must be added through i18n keys and all locale bundles must be updated.
    - path: "src/puripuly_heart/{providers,core,app}/**/*.py"
      instructions: |
        Keep async safety:
        - Avoid blocking the event loop with sync network/file operations in async paths.
        - Ensure provider close() is awaited in teardown/shutdown paths.
        - In Flet UI callbacks, use page.run_task for async operations.
